<div class="cadastros-container">
    <div class="header">
        <h2>Empreendimentos</h2>
        <button class="btn-novo" (click)="novoEmpreendimento()">
            + Novo Empreendimento
        </button>
    </div>

    <div class="filtros">
        <div class="filtro-group">
            <label for="construtora">Construtora:</label>
            <select id="construtora" [(ngModel)]="construtoraFiltro" (change)="filtrar()">
                <option [value]="0">Todas</option>
                <option *ngFor="let c of construtoras" [value]="c.id">
                    {{ c.nome }}
                </option>
            </select>
        </div>
    </div>

    <div class="loading" *ngIf="carregando">
        Carregando...
    </div>

    <table class="tabela" *ngIf="!carregando && empreendimentos.length > 0">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Endereço</th>
                <th>Construtora</th>
                <th>Data Criação</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let item of empreendimentos">
                <td>{{ item.id }}</td>
                <td>{{ item.nome }}</td>
                <td>{{ item.endereco || '-' }}</td>
                <td>{{ obterNomeConstrutora(item.construtoraId) }}</td>
                <td>{{ item.dataCriacao | date:'dd/MM/yyyy HH:mm' }}</td>
                <td class="acoes">
                    <button class="btn-editar" (click)="editarEmpreendimento(item.id)">✏️ Editar</button>
                    <button class="btn-excluir" (click)="excluirEmpreendimento(item.id, item.nome)">🗑️ Excluir</button>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="vazio" *ngIf="!carregando && empreendimentos.length === 0">
        <p>Nenhum empreendimento cadastrado.</p>
    </div>
</div>
