<div class="lead-details-wrapper container-fluid py-4" *ngIf="lead; else loadingTpl">
  <ul class="nav nav-tabs mb-3">
    <li class="nav-item">
      <button class="nav-link" [class.active]="activeTab === 'info'" (click)="setTab('info')" type="button">
        Informações
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" [class.active]="activeTab === 'docs'" (click)="setTab('docs')" type="button">
        Documentos
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" [class.active]="activeTab === 'proposal'" (click)="setTab('proposal')" type="button">
        Proposta
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" [class.active]="activeTab === 'schedule'" (click)="setTab('schedule')" type="button">
        Agendamentos
      </button>
    </li>
  </ul>

  <div class="row">
    <div class="col-lg-8 mb-3">
      <div *ngIf="activeTab === 'info'">
        <app-lead-summary-section
          [lead]="lead"
          [isEditing]="isEditing"
          [infoForm]="infoForm"
          [corretores]="corretores"
          [statusOptions]="statusOptions"
          (backRequested)="goBack()"
          (callRequested)="callLead()"
          (whatsappRequested)="whatsappLead()"
          (emailRequested)="emailLead()"
          (editToggled)="toggleEdit()"
          (infoSubmitted)="saveInfo()"
        ></app-lead-summary-section>
      </div>

      <div *ngIf="activeTab === 'docs'">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h5 class="card-title mb-3">Documentos</h5>
            <p class="text-muted mb-0">Em breve vamos implementar o upload e listagem de documentos do lead.</p>
          </div>
        </div>
      </div>

      <div *ngIf="activeTab === 'proposal'">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h5 class="card-title mb-3">Proposta</h5>
            <p class="text-muted mb-0">Aqui depois você pode exibir os dados da proposta vinculada ao lead.</p>
          </div>
        </div>
      </div>

      <div *ngIf="activeTab === 'schedule'">
        <app-lead-agenda-section
          class="d-block mb-3"
          [scheduleForm]="scheduleForm"
          [schedules]="schedules"
          [scheduleStatusOptions]="scheduleStatusOptions"
          (scheduleSubmitted)="saveSchedule('contato')"
          (scheduleStatusChanged)="handleContactScheduleStatusChange($event)"
        ></app-lead-agenda-section>

        <app-lead-visits-section
          [scheduleForm]="scheduleForm"
          [schedulesVisit]="schedulesVisit"
          [scheduleStatusOptions]="scheduleStatusOptions"
          (visitScheduleSubmitted)="saveSchedule('visita')"
          (visitStatusChanged)="handleVisitScheduleStatusChange($event)"
        ></app-lead-visits-section>
      </div>
    </div>

    <div class="col-lg-4">
      <app-lead-activities-section
        [activities]="activities"
        [isAddingActivity]="isAddingActivity"
        [activityForm]="activityForm"
        (addRequested)="startAddActivity()"
        (addCanceled)="cancelAddActivity()"
        (activitySubmitted)="saveActivity()"
      ></app-lead-activities-section>
    </div>
  </div>
</div>

<ng-template #loadingTpl>
  <div class="container-fluid py-5 text-center text-muted">
    Carregando lead...
  </div>
</ng-template>
