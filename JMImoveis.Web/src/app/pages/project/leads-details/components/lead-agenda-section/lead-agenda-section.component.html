<div class="card shadow-sm border-0">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="card-title mb-0">Agendar Contato</h5>
    </div>

    <form [formGroup]="scheduleForm" (ngSubmit)="scheduleSubmitted.emit()" class="row g-3 mb-4">
      <div class="col-md-3"><label class="form-label">Data</label><input type="date" class="form-control" formControlName="date" /></div>
      <div class="col-md-3"><label class="form-label">Horário</label><input type="time" class="form-control" formControlName="time" /></div>
      <div class="col-md-6">
        <label class="form-label">Observação</label>
        <input type="text" class="form-control" formControlName="note" placeholder="Ex: Retornar ligação, visita..." />
      </div>
      <div class="col-12 d-flex justify-content-end"><button type="submit" class="btn btn-orange">Salvar Agendamento de contato</button></div>
    </form>

    <div class="table-responsive" *ngIf="schedules.length > 0; else noSchedulesContatoTpl">
      <table class="table align-middle">
        <thead>
          <tr><th>Data/Hora</th><th>Observação</th><th style="width: 220px;">Status</th></tr>
        </thead>
        <tbody>
          <tr *ngFor="let s of schedules">
            <td>{{ s.scheduledAt | date:'dd/MM/yyyy HH:mm' }}</td>
            <td>{{ s.note || '-' }}</td>
            <td>
              <select class="form-select" [ngModel]="s.status" (ngModelChange)="scheduleStatusChanged.emit({ schedule: s, status: $event })" [ngModelOptions]="{ standalone: true }">
                <option *ngFor="let opt of scheduleStatusOptions" [value]="opt.value">{{ opt.label }}</option>
              </select>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <ng-template #noSchedulesContatoTpl>
      <div class="text-muted">Nenhum agendamento de contato cadastrado.</div>
    </ng-template>
  </div>
</div>
