<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="page-title-box d-sm-flex align-items-center justify-content-between">
        <h4 class="mb-sm-0">Análise de Perfil e Crédito</h4>
      </div>
    </div>
  </div>

  <div class="row" *ngIf="!loading; else loadingTemplate">
    <div class="col-12">
      <div class="card">
        <div class="card-body">
          <div class="mb-4">
            <div class="small text-muted">Oportunidade vinculada</div>
            <div class="fw-semibold">Sale ID: {{ saleId }}</div>
            <div class="small text-muted" *ngIf="sale?.status">Status da oportunidade: {{ sale.status }}</div>
            <div class="small text-muted" *ngIf="sale?.contractNumber">Contrato: {{ sale.contractNumber }}</div>
          </div>

          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Status</label>
              <select class="form-select" [(ngModel)]="analysis.status" name="status">
                <option *ngFor="let option of statusOptions" [ngValue]="option.value">{{ option.label }}</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Customer ID</label>
              <input class="form-control" type="number" [(ngModel)]="analysis.customerId" name="customerId">
            </div>

            <div class="col-md-4">
              <label class="form-label">Analista</label>
              <input class="form-control" [(ngModel)]="analysis.analystName" name="analystName">
            </div>

            <div class="col-12">
              <label class="form-label">Parecer</label>
              <textarea class="form-control" rows="3" [(ngModel)]="analysis.summary" name="summary"></textarea>
            </div>

            <div class="col-12">
              <label class="form-label">Restrições</label>
              <textarea class="form-control" rows="4" [(ngModel)]="analysis.restrictions" name="restrictions"></textarea>
            </div>

            <div class="col-12">
              <label class="form-label">Observações</label>
              <textarea class="form-control" rows="4" [(ngModel)]="analysis.observations" name="observations"></textarea>
            </div>
          </div>

          <div class="mt-4 d-flex gap-2">
            <button class="btn btn-primary" (click)="save()" [disabled]="saving">
              {{ saving ? 'Salvando...' : 'Salvar análise' }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ng-template #loadingTemplate>
    <div class="row">
      <div class="col-12">
        <div class="card">
          <div class="card-body">Carregando análise...</div>
        </div>
      </div>
    </div>
  </ng-template>
</div>
