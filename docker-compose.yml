version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: jmimoveis-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jmoficial
    ports:
      - "3307:3306"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  api:
    image: mcr.microsoft.com/dotnet/aspnet:7.0
    container_name: jmimoveis-api
    environment:
      ConnectionStrings__DefaultConnection: "Server=jmimoveis-mysql;Port=3306;Database=jmoficial;User=root;Password=root;Connection Timeout=30;Allow User Variables=True;"
      Jwt__Secret: "fedaf7d8863b48e197b9287d492b708e"
    ports:
      - "5000:80"
    volumes:
      - /opt/jmimoveis-git/JMImoveis.API/publish:/app
    working_dir: /app
    command: dotnet /app/JMImoveis.API.dll
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy

  web:
    image: nginx:alpine
    container_name: jmimoveis-web
    ports:
      - "8800:80"
    volumes:
      - /opt/jmimoveis-git/JMImoveis.Web/dist:/usr/share/nginx/html:ro
      - /opt/jmimoveis-git/nginx-web.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
