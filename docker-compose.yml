version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: jmimoveis-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-CHANGE_ME}
      MYSQL_DATABASE: jmoficial
    volumes:
      - ./db:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - app-network

  backend:
    build:
      context: ./JMImoveis.API
      dockerfile: Dockerfile
    container_name: jmimoveis-api
    restart: always
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__Secret=${JWT_SECRET:-CHANGE_ME_JWT_SECRET}
      - ConnectionStrings__DefaultConnection=Server=jmimoveis-mysql;Port=3306;Database=jmoficial;User=root;Password=${MYSQL_ROOT_PASSWORD:-CHANGE_ME};Connection Timeout=30;Allow User Variables=True;
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  web:
    build:
      context: ./JMImoveis.Web
      dockerfile: Dockerfile
    container_name: jmimoveis-web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    name: app-network
    driver: bridge
